services:
  postgres:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: eldorya
      POSTGRES_PASSWORD: eldorya
      POSTGRES_DB: eldorya
    volumes:
      - pgdata:/var/lib/postgresql

  kurrentdb:
    image: kurrentplatform/kurrentdb:26.0
    ports:
      - "2113:2113"
    environment:
      KURRENTDB_INSECURE: "true"
      KURRENTDB_ENABLE_ATOM_PUB_OVER_HTTP: "true"

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: dev-access-key
      MINIO_ROOT_PASSWORD: dev-secret-key
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
